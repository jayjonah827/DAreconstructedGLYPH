<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>03 — Data Convergence — Heyer Livin'</title>
    <style>
      body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:#0a0a0a;color:#f5f5f5;margin:0;padding:3rem 2rem;line-height:1.6}
      main{max-width:760px;margin:0 auto}
      h1{font-size:clamp(1.8rem,4vw,2.6rem);margin-bottom:1rem}
      a{color:#d62828}
      pre{background:#111;border:1px solid #2e2e2e;padding:1rem;overflow-x:auto;font-size:.85rem}
    </style>
  </head>
  <body>
    <main>
      <p><a href="/">&larr; Home</a></p>
      <h1>03 — Cross-Domain Data Convergence</h1>
      <p>Live aggregate of structural-constraint ratios across recorded domains, anchored on reference point 0.39.</p>
      <pre id="payload">loading…</pre>
      <p><a href="/api/convergence">Open /api/convergence</a></p>
    </main>
    <script>
      fetch('/api/convergence')
        .then(r => r.json())
        .then(d => { document.getElementById('payload').textContent = JSON.stringify(d, null, 2); })
        .catch(e => { document.getElementById('payload').textContent = 'unavailable: ' + e; });
    </script>
  </body>
</html>
